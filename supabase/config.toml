# Declarative Auth config for Kostenplan, synced to the hosted Supabase
# project (ref hhsdloyyjmoqvctucwum) via `supabase config push`. See
# https://supabase.com/docs/guides/local-development/cli/config for the
# full reference — only the fields relevant to this project are set here.
project_id = "kostenplan"

[auth]
site_url = "https://kostenplan.nl"
additional_redirect_urls = [
  "http://localhost:3000/auth/callback",
  "https://kostenplan.nl/auth/callback",
]

[auth.email]
# Geen bevestigingsmail meer: signUp() geeft direct een sessie terug en de
# gebruiker komt meteen in het dashboard, in plaats van eerst een link in
# hun mailbox te moeten aanklikken.
enable_confirmations = false

# Supabase's built-in mailer always sends from a generic Supabase address —
# to change the visible sender name/address, connect a custom SMTP provider
# (e.g. Resend, Postmark, SendGrid) here. Uncomment and fill in real
# credentials (as environment variable references, never hardcoded) once
# you have a provider set up.
# [auth.email.smtp]
# enabled = true
# host = "smtp.your-provider.com"
# port = 587
# user = "env(SMTP_USER)"
# pass = "env(SMTP_PASS)"
# admin_email = "info@kostenplan.nl"
# sender_name = "Kostenplan"

# Google OAuth ("Doorgaan met Google" op /login en /registreren). Vul de
# client-ID en -secret hieronder in als omgevingsvariabelen nadat je een
# OAuth-clientadres hebt aangemaakt in de Google Cloud Console — zie de
# uitleg in het bijbehorende commit-bericht / PR-omschrijving voor de exacte
# stappen en de redirect-URI die je daar moet invullen.
[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET)"
